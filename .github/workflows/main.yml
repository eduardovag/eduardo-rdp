name: RDP-Fixed-Eduardo-RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360 # Límite de los runners gratuitos

    steps:
      - name: Configure Core RDP Settings
        run: |
          # Habilitar RDP y relajar seguridad para compatibilidad directa
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

          # Abrir el firewall
          netsh advfirewall firewall add rule name="RDP-Static" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create Eduardo Avila User
        run: |
          $password = "..147258.."
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          # Crear usuario "Eduardo Avila"
          New-LocalUser -Name "Eduardo Avila" -Password $securePass -AccountNeverExpires
          
          # Asignar permisos de Administrador
          Add-LocalGroupMember -Group "Administrators" -Member "Eduardo Avila"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "Eduardo Avila"

      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile tailscale.msi
          Start-Process msiexec.exe -ArgumentList "/i", "tailscale.msi", "/quiet", "/norestart" -Wait

      - name: Establish Tailscale Connection (eduardo-rdp)
        run: |
          # Usando el hostname fijo solicitado
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=eduardo-rdp
          
          $tsIP = ""
          while (-not $tsIP) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 2
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Final Connection Details
        run: |
          Write-Host "`n=========================================="
          Write-Host "SERVIDOR LISTO"
          Write-Host "Hostname: eduardo-rdp"
          Write-Host "IP Tailscale: $env:TAILSCALE_IP"
          Write-Host "Usuario: Eduardo Avila"
          Write-Host "Password: ..147258.."
          Write-Host "==========================================`n"

      - name: Maintain Connection
        run: |
          while ($true) {
              Write-Host "[$(Get-Date)] Conexión activa en eduardo-rdp..."
              Start-Sleep -Seconds 300
          }
